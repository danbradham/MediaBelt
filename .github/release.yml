changelog:
  exclude:
    labels:
      - ignore-for-release
      - gh-actions
  categories:
    - title: 💥 Breaking Changes
      labels:
        - breaking-change
    - title: 🎉 New and Improved
      labels:
        - enhancement
        - security
    - title: 🛠 Fixes
      labels:
        - bug
    - title: 👊 Other Changes
      labels:
        - "*"
